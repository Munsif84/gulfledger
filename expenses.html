<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المصاريف · GulfLedger</title>
<!--
  Round 4g: expenses.html merged into finance.html as the "Expenses" tab.
  This file is now a thin redirect so old bookmarks/links keep working.
  Forwards any ?action= and other query params through to finance.html.
-->
<meta http-equiv="refresh" content="0; url=finance.html?tab=expenses">
<script>
  (function(){
    var qs = window.location.search || '';
    var existing = qs.indexOf('tab=') !== -1 ? qs : (qs ? qs + '&tab=expenses' : '?tab=expenses');
    window.location.replace('finance.html' + existing);
  })();
</script>
</head>
<body>
<p style="font-family:system-ui,sans-serif;text-align:center;padding:60px;">
  Redirecting to <a href="finance.html?tab=expenses">finance.html</a>...
</p>
</body>
</html>
