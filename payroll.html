body{background:var(--color-bg-page);}
.pr-wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px;}
.pr-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
.pr-head h1{font-size:var(--text-2xl);font-weight:800;color:var(--color-text-strong);}
.pr-head p{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px;}
.pr-tabs{display:flex;gap:4px;border-bottom:1px solid var(--color-border);margin-bottom:20px;}
.pr-tab{padding:9px 16px;border:none;background:none;font-family:var(--font-sans);font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted);cursor:pointer;border-bottom:2px solid transparent;}
.pr-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);}
.pr-table{width:100%;border-collapse:collapse;background:var(--color-bg-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;}

.pr-table td{padding:11px 12px;border-top:1px solid var(--color-border);font-size:var(--text-sm);}

.pr-pill.draft{background:var(--color-status-info-bg,#DBEAFE);color:var(--color-status-info,#1E40AF);}
.pr-pill.posted{background:var(--color-status-success-bg,#DCFCE7);color:var(--color-status-success,#166534);}

.pr-back{display:inline-block;margin-bottom:12px;color:var(--color-primary);text-decoration:none;font-weight:600;font-size:var(--text-sm);}
.pr-back:hover{text-decoration:underline;}
.pr-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.pr-modal{background:var(--color-bg-surface);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.pr-modal-head{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;}
.pr-modal-head h3{font-size:var(--text-lg);font-weight:700;}
.pr-modal-body{padding:20px;}

<script>
const SUPABASE_URL='https://ykzivnasjwtuhvjxfxzf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlreml2bmFzand0dWh2anhmeHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjI5NzAsImV4cCI6MjA5MjE5ODk3MH0.t9n60yaQJZcgD4BoNIhGiNNVMB3QIxcLc4KQL82pmNE';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let L=localStorage.getItem('gl_lang')||'ar';
let currentBiz=null, currentUser=null, employees=[], gosiRates=[], preparedRun=null;

function t(ar,en){return L==='ar'?ar:en;}
function applyLang(){document.querySelectorAll('[data-ar]').forEach(el=>{el.textContent=(L==='ar')?el.getAttribute('data-ar'):el.getAttribute('data-en');});}
function fmt(n){return (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function escA(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function init(){
  applyLang();
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  currentUser=session.user;
  const {data:mem}=await sb.from('business_users').select('business_id,role').eq('user_id',currentUser.id).eq('status','active').limit(1).maybeSingle();
  if(!mem){document.getElementById('employees-list').innerHTML=`<div class="pr-empty">${t('لا توجد منشأة','No business found')}</div>`;return;}
  currentBiz={id:mem.business_id,role:mem.role};
  window.currentBiz=currentBiz;
  /* Load GOSI rates (shared config) */
  const {data:rates}=await sb.from('gosi_rates').select('*');
  gosiRates=rates||[];
  /* Populate month/year selectors */
  prPopulatePeriod();
  await loadEmployees();
  await loadRunsHistory();
}

/* ── GOSI ENGINE ──────────────────────────────────────────────
   Picks the right rate row by nationality + hire date, computes
   contributory base = min(basic+housing, cap), and returns the
   employee + employer amounts. Rates come from the gosi_rates table
   (data, not hardcoded) so scheduled increases are config edits. */
function gosiCategory(emp){
  if(!emp.is_saudi) return 'non_saudi';
  /* Saudi: pre vs post 3 July 2024 by hire date */
  const hire = emp.hire_date ? new Date(emp.hire_date) : null;
  const cutoff = new Date('2024-07-03');
  if(hire && hire >= cutoff) return 'saudi_post2024';
  return 'saudi_pre2024';
}
function computeGosi(emp){
  const cat = gosiCategory(emp);
  const rate = gosiRates.find(r=>r.category===cat);
  const base0 = (Number(emp.basic_salary)||0) + (Number(emp.housing_allowance)||0);
  if(!rate){ return {category:cat, base:base0, employee:0, employer:0, missingRate:true}; }
  const cap = Number(rate.wage_cap)||45000;
  const base = Math.min(base0, cap);
  return {
    category: cat,
    base: base,
    employee: +(base * Number(rate.employee_rate)).toFixed(2),
    employer: +(base * Number(rate.employer_rate)).toFixed(2)
  };
}
function grossOf(emp){
  return (Number(emp.basic_salary)||0)+(Number(emp.housing_allowance)||0)+(Number(emp.transport_allowance)||0)+(Number(emp.other_allowance)||0);
}

/* ── TABS ── */
function prShowTab(name){
  document.getElementById('tab-employees').style.display = name==='employees'?'':'none';
  document.getElementById('tab-runs').style.display = name==='runs'?'':'none';
  document.getElementById('tab-btn-employees').classList.toggle('active',name==='employees');
  document.getElementById('tab-btn-runs').classList.toggle('active',name==='runs');
}

/* ── EMPLOYEES ── */
async function loadEmployees(){
  const {data,error}=await sb.from('employees').select('*').eq('business_id',currentBiz.id).eq('is_active',true).order('created_at');
  if(error){document.getElementById('employees-list').innerHTML=`<div class="pr-empty">${escA(error.message)}</div>`;return;}
  employees=data||[];
  renderEmployees();
}
function renderEmployees(){
  const el=document.getElementById('employees-list');
  const isOwner = currentBiz.role==='owner';
  document.getElementById('emp-add-btn').style.display = isOwner?'':'none';
  if(!employees.length){el.innerHTML=`<div class="pr-empty">${t('لا يوجد موظفون بعد. أضف أول موظف.','No employees yet. Add your first one.')}</div>`;return;}
  el.innerHTML=`<table class="pr-table"><thead><tr>
    <th>${t('الاسم','Name')}</th><th>${t('الجنسية','Nationality')}</th>
    <th class="num">${t('الأساسي','Basic')}</th><th class="num">${t('الإجمالي','Gross')}</th>
    <th class="num">${t('تأمينات الموظف','GOSI (Emp)')}</th><th>${isOwner?'':''}</th>
  </tr></thead><tbody>${employees.map(e=>{
    const g=computeGosi(e); const name=L==='ar'?(e.name_ar||e.name_en||'—'):(e.name_en||e.name_ar||'—');
    return `<tr>
      <td><strong>${escA(name)}</strong></td>
      <td><span class="pr-pill ${e.is_saudi?'saudi':'expat'}">${e.is_saudi?t('سعودي','Saudi'):t('غير سعودي','Non-Saudi')}</span></td>
      <td class="num">${fmt(e.basic_salary)}</td>
      <td class="num">${fmt(grossOf(e))}</td>
      <td class="num">${fmt(g.employee)}</td>
      <td>${isOwner?`<button class="gl-btn is-ghost" style="padding:4px 10px;font-size:12px;" onclick="prOpenEmployee('${e.id}')">${t('تعديل','Edit')}</button>`:''}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}
function prOpenEmployee(id){
  if(currentBiz.role!=='owner'){return;}
  const set=(f,v)=>{document.getElementById(f).value=v==null?'':v;};
  if(id){
    const e=employees.find(x=>x.id===id); if(!e)return;
    document.getElementById('emp-id').value=e.id;
    set('emp-name-ar',e.name_ar);set('emp-name-en',e.name_en);
    document.getElementById('emp-is-saudi').value=e.is_saudi?'true':'false';
    set('emp-hire-date',e.hire_date);set('emp-iqama',e.iqama_or_id);set('emp-gosi-number',e.gosi_number);
    set('emp-iban',e.bank_iban);set('emp-basic',e.basic_salary);set('emp-housing',e.housing_allowance);
    set('emp-transport',e.transport_allowance);set('emp-other',e.other_allowance);
    document.getElementById('emp-modal-title').textContent=t('تعديل موظف','Edit Employee');
  } else {
    ['emp-id','emp-name-ar','emp-name-en','emp-hire-date','emp-iqama','emp-gosi-number','emp-iban'].forEach(f=>set(f,''));
    ['emp-basic','emp-housing','emp-transport','emp-other'].forEach(f=>set(f,'0'));
    document.getElementById('emp-is-saudi').value='true';
    document.getElementById('emp-modal-title').textContent=t('موظف جديد','New Employee');
  }
  document.getElementById('emp-modal').style.display='flex';
}
function prCloseEmployee(){document.getElementById('emp-modal').style.display='none';}
async function prSaveEmployee(){
  const v=id=>document.getElementById(id).value;
  const nameAr=v('emp-name-ar').trim(), nameEn=v('emp-name-en').trim();
  if(!nameAr && !nameEn){alert(t('الاسم مطلوب','Name required'));return;}
  const payload={
    business_id:currentBiz.id, name_ar:nameAr||null, name_en:nameEn||null,
    is_saudi: v('emp-is-saudi')==='true',
    nationality: v('emp-is-saudi')==='true'?'SA':null,
    hire_date: v('emp-hire-date')||null, iqama_or_id:v('emp-iqama').trim()||null,
    gosi_number:v('emp-gosi-number').trim()||null, bank_iban:v('emp-iban').trim()||null,
    basic_salary:parseFloat(v('emp-basic'))||0, housing_allowance:parseFloat(v('emp-housing'))||0,
    transport_allowance:parseFloat(v('emp-transport'))||0, other_allowance:parseFloat(v('emp-other'))||0,
    updated_at:new Date().toISOString()
  };
  const id=v('emp-id');
  const btn=document.getElementById('emp-save-btn'); btn.disabled=true;
  let error;
  if(id){({error}=await sb.from('employees').update(payload).eq('id',id));}
  else {({error}=await sb.from('employees').insert(payload));}
  btn.disabled=false;
  if(error){alert(error.message);return;}
  prCloseEmployee(); await loadEmployees();
}

/* ── PAYROLL RUN ── */
function prPopulatePeriod(){
  const now=new Date();
  const monthSel=document.getElementById('run-month'), yearSel=document.getElementById('run-year');
  const months=L==='ar'?['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']
                       :['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  monthSel.innerHTML=months.map((m,i)=>`<option value="${i+1}"${i===now.getMonth()?' selected':''}>${m}</option>`).join('');
  let yrs='';for(let y=now.getFullYear();y>=now.getFullYear()-3;y--){yrs+=`<option value="${y}"${y===now.getFullYear()?' selected':''}>${y}</option>`;}
  yearSel.innerHTML=yrs;
}
function prPrepareRun(){
  if(currentBiz.role!=='owner'){alert(t('المالك فقط','Owner only'));return;}
  if(!employees.length){alert(t('أضف موظفين أولاً','Add employees first'));return;}
  const month=+document.getElementById('run-month').value, year=+document.getElementById('run-year').value;
  /* Compute per-employee figures */
  const lines=employees.map(e=>{
    const g=computeGosi(e); const gross=grossOf(e);
    const net=+(gross - g.employee).toFixed(2);
    return {employee:e, gross, gosi_base:g.base, gosi_employee:g.employee, gosi_employer:g.employer, gosi_category:g.category, net};
  });
  preparedRun={month,year,lines};
  const totals=lines.reduce((a,l)=>({gross:a.gross+l.gross,ge:a.ge+l.gosi_employee,gr:a.gr+l.gosi_employer,net:a.net+l.net}),{gross:0,ge:0,gr:0,net:0});
  const missingRate=lines.some(l=>!gosiRates.find(r=>r.category===l.gosi_category));
  const area=document.getElementById('run-area');
  area.innerHTML=`
    ${missingRate?`<div class="pr-warn">${t('تنبيه: بعض فئات التأمينات غير معرّفة في جدول النسب.','Warning: some GOSI categories have no rate row.')}</div>`:''}
    <div class="pr-kpis">
      <div class="pr-kpi"><div class="pr-kpi-label">${t('إجمالي الرواتب','Total Gross')}</div><div class="pr-kpi-val">${fmt(totals.gross)}</div></div>
      <div class="pr-kpi"><div class="pr-kpi-label">${t('تأمينات الموظفين','Employee GOSI')}</div><div class="pr-kpi-val">${fmt(totals.ge)}</div></div>
      <div class="pr-kpi"><div class="pr-kpi-label">${t('تأمينات صاحب العمل','Employer GOSI')}</div><div class="pr-kpi-val">${fmt(totals.gr)}</div></div>
      <div class="pr-kpi"><div class="pr-kpi-label">${t('صافي المدفوع','Total Net')}</div><div class="pr-kpi-val">${fmt(totals.net)}</div></div>
    </div>
    <table class="pr-table"><thead><tr>
      <th>${t('الموظف','Employee')}</th><th class="num">${t('الإجمالي','Gross')}</th>
      <th class="num">${t('وعاء التأمين','GOSI base')}</th><th class="num">${t('تأمين الموظف','GOSI Emp')}</th>
      <th class="num">${t('تأمين الشركة','GOSI Co')}</th><th class="num">${t('الصافي','Net')}</th>
    </tr></thead><tbody>${lines.map(l=>{
      const name=L==='ar'?(l.employee.name_ar||l.employee.name_en||'—'):(l.employee.name_en||l.employee.name_ar||'—');
      return `<tr><td>${escA(name)}</td><td class="num">${fmt(l.gross)}</td><td class="num">${fmt(l.gosi_base)}</td>
        <td class="num">${fmt(l.gosi_employee)}</td><td class="num">${fmt(l.gosi_employer)}</td><td class="num">${fmt(l.net)}</td></tr>`;
    }).join('')}</tbody></table>
    <div style="margin-top:14px;display:flex;gap:10px;justify-content:flex-end;">
      <button class="gl-btn is-primary" id="run-finalize-btn" onclick="prFinalizeRun()" data-ar="اعتماد وترحيل للقيود" data-en="Finalize & post to ledger">${t('اعتماد وترحيل للقيود','Finalize & post to ledger')}</button>
    </div>`;
}

async function prFinalizeRun(){
  if(!preparedRun){return;}
  if(currentBiz.role!=='owner'){alert(t('المالك فقط','Owner only'));return;}
  const btn=document.getElementById('run-finalize-btn'); btn.disabled=true; btn.textContent=t('جارٍ الترحيل...','Posting...');
  try{
    const {month,year,lines}=preparedRun;
    const totals=lines.reduce((a,l)=>({gross:a.gross+l.gross,ge:a.ge+l.gosi_employee,gr:a.gr+l.gosi_employer,net:a.net+l.net}),{gross:0,ge:0,gr:0,net:0});

    /* 1. Resolve account codes via the role map (same pattern as invoices) */
    const {data:roleData,error:roleErr}=await sb.rpc('resolve_roles_batch',{
      p_business_id:currentBiz.id,
      p_roles:['salaries_expense','salaries_payable','gosi_expense','gosi_payable']
    });
    if(roleErr) throw roleErr;
    const codes=Object.fromEntries((roleData||[]).map(r=>[r.role,r.resolved_code]));
    const need=['salaries_expense','salaries_payable','gosi_expense','gosi_payable'].filter(r=>!codes[r]);
    if(need.length) throw new Error(t('حسابات غير معرّفة: ','Unmapped accounts: ')+need.join(', '));

    /* 2. Create the payroll_run row */
    const {data:run,error:runErr}=await sb.from('payroll_runs').insert({
      business_id:currentBiz.id, period_year:year, period_month:month, status:'finalized',
      total_gross:totals.gross, total_gosi_employee:totals.ge, total_gosi_employer:totals.gr,
      total_deductions:totals.ge, total_net:totals.net
    }).select().single();
    if(runErr) throw runErr;

    /* 3. Insert run lines */
    const lineRows=lines.map(l=>({
      run_id:run.id, employee_id:l.employee.id,
      basic_salary:l.employee.basic_salary, housing_allowance:l.employee.housing_allowance,
      transport_allowance:l.employee.transport_allowance, other_allowance:l.employee.other_allowance,
      gross:l.gross, gosi_category:l.gosi_category, gosi_base:l.gosi_base,
      gosi_employee:l.gosi_employee, gosi_employer:l.gosi_employer, other_deductions:0, net_pay:l.net
    }));
    const {error:linesErr}=await sb.from('payroll_run_lines').insert(lineRows);
    if(linesErr) throw linesErr;

    /* 4. Post the balanced journal entry.
       Debit: salaries_expense (gross) + gosi_expense (employer GOSI)
       Credit: salaries_payable (net) + gosi_payable (employee + employer GOSI)
       Balance check: gross + employer = net + (employee+employer), and net = gross - employee ✓ */
    const periodLabel=`${year}-${String(month).padStart(2,'0')}`;
    const {data:entry,error:entryErr}=await sb.from('journal_entries').insert({
      user_id:currentUser.id, business_id:currentBiz.id, entry_date:`${periodLabel}-28`,
      reference:'PAYROLL-'+periodLabel, description:t('رواتب '+periodLabel,'Payroll '+periodLabel),
      source:'payroll', source_id:run.id, status:'posted', is_balanced:true
    }).select().single();
    if(entryErr) throw entryErr;

    const gosiTotal=+(totals.ge+totals.gr).toFixed(2);
    const jlines=[
      {entry_id:entry.id,user_id:currentUser.id,account_code:codes.salaries_expense,account_name:t('مصروف الرواتب','Salaries Expense'),debit:totals.gross,credit:0,description:t('رواتب '+periodLabel,'Salaries '+periodLabel)},
      {entry_id:entry.id,user_id:currentUser.id,account_code:codes.gosi_expense,account_name:t('تأمينات صاحب العمل','Employer GOSI'),debit:totals.gr,credit:0,description:t('تأمينات صاحب العمل','Employer GOSI')},
      {entry_id:entry.id,user_id:currentUser.id,account_code:codes.salaries_payable,account_name:t('رواتب مستحقة','Salaries Payable'),debit:0,credit:totals.net,description:t('صافي الرواتب','Net pay')},
      {entry_id:entry.id,user_id:currentUser.id,account_code:codes.gosi_payable,account_name:t('تأمينات مستحقة','GOSI Payable'),debit:0,credit:gosiTotal,description:t('إجمالي التأمينات','Total GOSI')}
    ];
    const {error:jlErr}=await sb.from('journal_lines').insert(jlines);
    if(jlErr) throw jlErr;

    /* 5. Link entry + mark posted */
    await sb.from('payroll_runs').update({status:'posted',journal_entry_id:entry.id,posted_at:new Date().toISOString()}).eq('id',run.id);

    alert(t('✅ تم اعتماد الرواتب وترحيلها للقيود','✅ Payroll finalized and posted to the ledger'));
    preparedRun=null;
    document.getElementById('run-area').innerHTML='';
    await loadRunsHistory();
  }catch(e){
    alert((L==='ar'?'خطأ: ':'Error: ')+(e.message||e));
  }finally{
    const b=document.getElementById('run-finalize-btn'); if(b){b.disabled=false;b.textContent=t('اعتماد وترحيل للقيود','Finalize & post to ledger');}
  }
}

/* ── REVERSE A POSTED RUN ──────────────────────────────────────
   Audit-trail-safe: posts a MIRROR journal entry (debits<->credits
   swapped), linked to the original run, and marks the run 'reversed'.
   Never deletes. Mirrors the invoice-reversal pattern. Owner/accountant only. */
async function prReverseRun(runId){
  const ar = L==='ar';
  if(!(currentBiz.role==='owner'||currentBiz.role==='accountant')){alert(t('المالك أو المحاسب فقط','Owner or accountant only'));return;}
  if(!confirm(t('سيتم إنشاء قيد عكسي لإلغاء هذا التشغيل (مع الاحتفاظ بالسجل للتدقيق). متابعة؟','This will post a reversing entry to cancel this run (original kept for audit). Continue?')))return;
  try{
    /* Load the run + its original journal lines */
    const {data:run,error:runErr}=await sb.from('payroll_runs').select('*').eq('id',runId).single();
    if(runErr)throw runErr;
    if(run.status!=='posted'){alert(t('لا يمكن العكس إلا لتشغيل مُرحّل','Only a posted run can be reversed'));return;}
    if(!run.journal_entry_id){throw new Error(t('لا يوجد قيد مرتبط','No linked journal entry'));}

    const {data:origLines,error:olErr}=await sb.from('journal_lines').select('*').eq('entry_id',run.journal_entry_id);
    if(olErr)throw olErr;
    if(!origLines||!origLines.length){throw new Error(t('لا توجد بنود للقيد الأصلي','Original entry has no lines'));}

    const periodLabel=`${run.period_year}-${String(run.period_month).padStart(2,'0')}`;
    const today=new Date().toISOString().slice(0,10);

    /* Post the reversing entry: swap debit<->credit on each line. Linked to the
       same run via source_id, clearly described as a reversal for the audit trail. */
    const {data:revEntry,error:reErr}=await sb.from('journal_entries').insert({
      user_id:currentUser.id, business_id:currentBiz.id, entry_date:today,
      reference:'PAYROLL-REV-'+periodLabel,
      description:t('عكس رواتب '+periodLabel,'Reversal of payroll '+periodLabel),
      source:'payroll_reversal', source_id:run.id, status:'posted', is_balanced:true
    }).select().single();
    if(reErr)throw reErr;

    const revLines=origLines.map(l=>({
      entry_id:revEntry.id, user_id:currentUser.id,
      account_code:l.account_code, account_name:l.account_name,
      debit:Number(l.credit)||0, credit:Number(l.debit)||0,   /* swapped */
      description:t('عكس: ','Reversal: ')+(l.description||'')
    }));
    const {error:rlErr}=await sb.from('journal_lines').insert(revLines);
    if(rlErr)throw rlErr;

    /* Mark the run reversed (keep the original entry intact for audit) */
    await sb.from('payroll_runs').update({status:'reversed'}).eq('id',run.id);

    alert(t('✅ تم عكس التشغيل وترحيل القيد العكسي','✅ Run reversed; reversing entry posted'));
    await loadRunsHistory();
  }catch(e){
    alert((ar?'خطأ: ':'Error: ')+(e.message||e));
  }
}

async function loadRunsHistory(){
  const {data}=await sb.from('payroll_runs').select('*').eq('business_id',currentBiz.id).order('period_year',{ascending:false}).order('period_month',{ascending:false}).limit(24);
  const el=document.getElementById('runs-history');
  if(!data||!data.length){el.innerHTML=`<div class="pr-empty">${t('لا توجد عمليات تشغيل بعد','No runs yet')}</div>`;return;}
  el.innerHTML=`<table class="pr-table"><thead><tr>
    <th>${t('الفترة','Period')}</th><th class="num">${t('الإجمالي','Gross')}</th>
    <th class="num">${t('الصافي','Net')}</th><th class="num">${t('التأمينات','GOSI')}</th><th>${t('الحالة','Status')}</th><th></th>
  </tr></thead><tbody>${data.map(r=>{
    const statusLabel={draft:t('مسودة','Draft'),finalized:t('معتمد','Finalized'),posted:t('مُرحّل','Posted'),reversed:t('ملغى','Reversed')}[r.status]||r.status;
    const canReverse = r.status==='posted' && (currentBiz.role==='owner'||currentBiz.role==='accountant');
    const reverseBtn = canReverse ? `<button class="gl-btn is-ghost" style="padding:4px 10px;font-size:12px;color:var(--red,#B91C1C);" onclick="prReverseRun('${r.id}')">${t('↩ عكس القيد','↩ Reverse')}</button>` : '';
    return `<tr>
      <td>${r.period_year}-${String(r.period_month).padStart(2,'0')}</td>
      <td class="num">${fmt(r.total_gross)}</td><td class="num">${fmt(r.total_net)}</td>
      <td class="num">${fmt((Number(r.total_gosi_employee)||0)+(Number(r.total_gosi_employer)||0))}</td>
      <td><span class="pr-pill ${r.status}">${statusLabel}</span></td>
      <td>${reverseBtn}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

init();
</script>
