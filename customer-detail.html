<!DOCTYPE html>
<!--
  GulfLedger — customer-detail.html
  Round 4l.2: minimal customer detail page.
  Shows: customer info + 4 stat cards + tabbed list (invoices / payments).
  URL param: ?id=<customer_uuid>
-->
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>تفاصيل العميل · GulfLedger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F7F5;--ink:#0F1F18;--navy:#0F1F18;--brand:#0E5C3F;--blue:#1D7A4D;--green:#1D9E75;
  --tint:#E6F2EC;--light:#C4DFD0;--muted:#6B7770;--border:#DCE5DD;--red:#B8492A;--amber:#C68B0E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.5;}
.mono{font-family:'DM Mono',monospace;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

/* Topnav */
.topnav{background:var(--navy);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;}
.topnav-brand{color:#fff;font-weight:800;font-size:16px;}
.topnav-back{color:rgba(255,255,255,0.85);font-size:13px;}

/* Page */
.page{max-width:1100px;margin:0 auto;padding:20px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.cust-title{font-size:22px;font-weight:800;color:var(--navy);}
.cust-title-en{font-size:13px;color:var(--muted);font-weight:500;margin-top:2px;}
.badge-b2c{background:#fef3c7;color:#78350f;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;}
.badge-b2b{background:#e0f2fe;color:#0369a1;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;}

/* Info card */
.info-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.info-item{}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px;}
.info-value{font-size:14px;color:var(--ink);font-weight:600;}
.info-value.mono{font-size:13px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.stat-value{font-size:20px;font-weight:800;color:var(--navy);margin-top:4px;font-family:'DM Mono',monospace;}
.stat.green .stat-value{color:var(--green);}
.stat.red .stat-value{color:var(--red);}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:14px;}
.tab{padding:10px 18px;background:transparent;border:none;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* List */
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.tbl th{padding:10px 12px;text-align:start;background:var(--bg);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;border-bottom:1px solid var(--border);}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover{background:#fafbfa;cursor:pointer;}
.tbl .num{text-align:end;font-family:'DM Mono',monospace;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;background:#fff;border:1px solid var(--border);border-radius:12px;}
.status-paid{background:#dcfce7;color:#166534;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.status-unpaid{background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.status-partial{background:#fef3c7;color:#78350f;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.status-voided{background:#e5e7eb;color:#6b7280;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;}

.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.error{text-align:center;padding:40px 20px;color:var(--red);}
</style>
</head>
<body>

<div class="topnav">
  <div class="topnav-brand">GulfLedger</div>
  <a href="invoices.html?tab=customers" class="topnav-back">← العودة للعملاء · Back to customers</a>
</div>

<div id="loading-state" class="loading">جارٍ التحميل... · Loading...</div>
<div id="error-state" class="error" style="display:none;"></div>

<div class="page" id="page" style="display:none;">

  <!-- Header -->
  <div class="page-header">
    <div>
      <div class="cust-title" id="cust-name-ar">—</div>
      <div class="cust-title-en" id="cust-name-en"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span id="cust-type-badge"></span>
      <a href="#" id="new-invoice-btn" style="background:var(--blue);color:#fff;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;">
        + فاتورة جديدة · New Invoice
      </a>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">عدد الفواتير · Invoices</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat green">
      <div class="stat-label">إجمالي المدفوع · Total Paid</div>
      <div class="stat-value" id="stat-paid">SAR 0</div>
    </div>
    <div class="stat red">
      <div class="stat-label">المتبقي · Outstanding</div>
      <div class="stat-value" id="stat-outstanding">SAR 0</div>
    </div>
    <div class="stat">
      <div class="stat-label">آخر فاتورة · Last Invoice</div>
      <div class="stat-value" id="stat-last-date" style="font-size:14px;">—</div>
    </div>
  </div>

  <!-- Customer info card -->
  <div class="info-card">
    <div class="info-grid" id="info-grid"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-invoices" onclick="switchTab('invoices')">الفواتير · Invoices</button>
    <button class="tab" id="tab-payments" onclick="switchTab('payments')">المدفوعات · Payments</button>
  </div>

  <!-- Pane: Invoices -->
  <div id="pane-invoices">
    <div id="invoices-list"></div>
  </div>

  <!-- Pane: Payments -->
  <div id="pane-payments" style="display:none;">
    <div id="payments-list"></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://eepqhnmzghsuoidvhmgd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHFobm16Z2hzdW9pZHZobWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzU3MTczMzgsImV4cCI6MjA1MTI5MzMzOH0.Mx9dSQOP-6Ur45h-h1-tVUMQGHYwLp2nbPK0LMwRNgI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentCustomer = null;
let allInvoices = [];

function fmt(n){ return Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function escHTML(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

async function init(){
  const params = new URLSearchParams(window.location.search);
  const customerId = params.get('id');
  if(!customerId){
    showError('لا يوجد رقم عميل · No customer ID');
    return;
  }

  /* Auth check */
  const {data:{user}} = await sb.auth.getUser();
  if(!user){
    window.location.href = 'index.html';
    return;
  }

  try {
    /* Load customer */
    const {data: cust, error: custErr} = await sb.from('customers').select('*').eq('id', customerId).single();
    if(custErr || !cust){
      showError('العميل غير موجود · Customer not found');
      return;
    }
    currentCustomer = cust;

    /* Load invoices for this customer */
    const {data: invs} = await sb.from('invoices')
      .select('id, invoice_number, issue_date, due_date, total, amount_paid, status, payment_status, invoice_type')
      .eq('customer_id', customerId)
      .order('issue_date', {ascending: false});
    allInvoices = invs || [];

    renderAll();
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('page').style.display = '';
  } catch(e){
    console.error('[GL] customer-detail init', e);
    showError('فشل التحميل · Load failed: ' + e.message);
  }
}

function showError(msg){
  document.getElementById('loading-state').style.display = 'none';
  const err = document.getElementById('error-state');
  err.textContent = msg;
  err.style.display = '';
}

function renderAll(){
  const c = currentCustomer;
  /* Header */
  document.getElementById('cust-name-ar').textContent = c.name_ar || c.name_en || '—';
  document.getElementById('cust-name-en').textContent = c.name_en || '';

  const typeBadge = document.getElementById('cust-type-badge');
  if(c.customer_type === 'b2b'){
    typeBadge.innerHTML = '<span class="badge-b2b">B2B · شركة</span>';
  } else {
    typeBadge.innerHTML = '<span class="badge-b2c">B2C · فرد</span>';
  }

  document.getElementById('new-invoice-btn').href = `invoices.html?action=new_invoice&customer=${c.id}`;

  /* Stats */
  document.getElementById('stat-count').textContent = allInvoices.filter(i => i.status !== 'voided').length;
  document.getElementById('stat-paid').textContent = 'SAR ' + fmt(c.total_paid || 0);
  document.getElementById('stat-outstanding').textContent = 'SAR ' + fmt(c.total_outstanding || 0);
  document.getElementById('stat-last-date').textContent = c.last_invoice_date || '—';

  /* Info grid */
  const info = document.getElementById('info-grid');
  const items = [];
  if(c.cr_number) items.push(['CR · سجل تجاري', c.cr_number, true]);
  if(c.tax_number) items.push(['VAT · الرقم الضريبي', c.tax_number, true]);
  if(c.phone) items.push(['الهاتف · Phone', c.phone, true]);
  if(c.email) items.push(['البريد · Email', c.email, false]);
  if(c.customer_code) items.push(['الرمز · Code', c.customer_code, true]);
  /* Address */
  const addrParts = [c.building_number, c.street_name, c.district, c.city, c.postal_code].filter(Boolean);
  if(addrParts.length){
    items.push(['العنوان · Address', addrParts.join('، '), false]);
  }
  if(c.notes){
    items.push(['ملاحظات · Notes', c.notes, false]);
  }
  if(items.length === 0){
    info.innerHTML = `<div style="color:var(--muted);font-size:13px;">لا توجد بيانات إضافية · No additional info</div>`;
  } else {
    info.innerHTML = items.map(([label, value, mono]) =>
      `<div class="info-item">
        <div class="info-label">${escHTML(label)}</div>
        <div class="info-value ${mono ? 'mono' : ''}">${escHTML(value)}</div>
      </div>`
    ).join('');
  }

  /* Invoice list */
  renderInvoicesList();
  renderPaymentsList();
}

function renderInvoicesList(){
  const wrap = document.getElementById('invoices-list');
  if(allInvoices.length === 0){
    wrap.innerHTML = `<div class="empty">لا توجد فواتير · No invoices yet</div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="tbl">
      <thead>
        <tr>
          <th>الرقم · Number</th>
          <th>التاريخ · Date</th>
          <th>النوع · Type</th>
          <th class="num">الإجمالي · Total</th>
          <th class="num">المدفوع · Paid</th>
          <th>الحالة · Status</th>
        </tr>
      </thead>
      <tbody>
        ${allInvoices.map(inv => {
          const total = parseFloat(inv.total) || 0;
          const paid = parseFloat(inv.amount_paid) || 0;
          let statusBadge;
          if(inv.status === 'voided') statusBadge = '<span class="status-voided">ملغية · Voided</span>';
          else if(inv.payment_status === 'paid') statusBadge = '<span class="status-paid">مدفوعة · Paid</span>';
          else if(inv.payment_status === 'partial') statusBadge = '<span class="status-partial">جزئية · Partial</span>';
          else statusBadge = '<span class="status-unpaid">غير مدفوعة · Unpaid</span>';
          const typeLabel = inv.invoice_type === 'b2b' ? 'B2B' : 'B2C';
          return `<tr onclick="window.location.href='invoice-view.html?id=${inv.id}'">
            <td class="mono" style="font-weight:700;">${escHTML(inv.invoice_number || '—')}</td>
            <td class="mono">${escHTML(inv.issue_date || '—')}</td>
            <td>${typeLabel}</td>
            <td class="num">SAR ${fmt(total)}</td>
            <td class="num">SAR ${fmt(paid)}</td>
            <td>${statusBadge}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderPaymentsList(){
  const wrap = document.getElementById('payments-list');
  /* Derive payments from paid/partial invoices.
     A real payments table would be cleaner but doesn't exist in current schema. */
  const paidInvoices = allInvoices.filter(i =>
    i.status !== 'voided' && (parseFloat(i.amount_paid) || 0) > 0
  );

  if(paidInvoices.length === 0){
    wrap.innerHTML = `<div class="empty">لا توجد مدفوعات · No payments yet</div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="tbl">
      <thead>
        <tr>
          <th>الفاتورة · Invoice</th>
          <th>تاريخ الفاتورة · Invoice Date</th>
          <th class="num">إجمالي الفاتورة · Invoice Total</th>
          <th class="num">المدفوع · Amount Paid</th>
          <th>الحالة · Status</th>
        </tr>
      </thead>
      <tbody>
        ${paidInvoices.map(inv => {
          const total = parseFloat(inv.total) || 0;
          const paid = parseFloat(inv.amount_paid) || 0;
          const fully = paid >= total - 0.01;
          return `<tr onclick="window.location.href='invoice-view.html?id=${inv.id}'">
            <td class="mono" style="font-weight:700;">${escHTML(inv.invoice_number || '—')}</td>
            <td class="mono">${escHTML(inv.issue_date || '—')}</td>
            <td class="num">SAR ${fmt(total)}</td>
            <td class="num" style="color:var(--green);font-weight:700;">SAR ${fmt(paid)}</td>
            <td>${fully ? '<span class="status-paid">كاملة · Full</span>' : '<span class="status-partial">جزئية · Partial</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function switchTab(name){
  ['invoices','payments'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === name);
    document.getElementById('pane-'+t).style.display = t === name ? '' : 'none';
  });
}

init();
</script>
</body>
</html>
