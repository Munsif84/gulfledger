<script>
/* Lang text pre-paint swap — eliminates Arabic→English wipe on page nav.
   Runs at DOMContentLoaded (before page-init applyLang) so visible text
   appears in the correct language from first paint. */
(function(){
  var lang = localStorage.getItem('gl_lang') || 'ar';
  function swap(){
    try {
      var els = document.querySelectorAll('[data-ar][data-en]');
      var attr = 'data-' + lang;
      for(var i = 0; i < els.length; i++){
        var v = els[i].getAttribute(attr);
        if(v != null) els[i].textContent = v;
      }
    } catch(e){}
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', swap, {once:true});
  } else {
    swap();
  }
})();
</script>

html,body{font-family:var(--font-sans);background:var(--color-bg-page);color:var(--color-text-default);min-height:100vh;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

<script>
const SUPABASE_URL = 'https://ykzivnasjwtuhvjxfxzf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlreml2bmFzand0dWh2anhmeHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjI5NzAsImV4cCI6MjA5MjE5ODk3MH0.t9n60yaQJZcgD4BoNIhGiNNVMB3QIxcLc4KQL82pmNE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser=null, currentBiz=null, currentCustomer=null, allInvoices=[], allCreditNotes=[], allDebitNotes=[];
function fmt(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function escHTML(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}

async function init(){
  const customerId = new URLSearchParams(window.location.search).get('id');
  if(!customerId){ showError('لا يوجد رقم عميل · No customer ID in URL'); return; }
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ window.location.href='login.html'; return; }
  currentUser = session.user;
  const {data: membership} = await sb.from('business_users').select('business_id, role').eq('user_id', currentUser.id).eq('status','active').limit(5);
  if(!membership || membership.length === 0){ showError('لا يوجد منشأة نشطة · No active business'); return; }
  const chosen = membership.find(m=>m.role==='owner') || membership[0];
  const {data: biz} = await sb.from('businesses').select('*').eq('id', chosen.business_id).maybeSingle();
  if(!biz){ showError('فشل تحميل المنشأة · Failed to load business'); return; }
  currentBiz = biz;
  try {
    const {data: cust, error: custErr} = await sb.from('customers').select('*').eq('id', customerId).maybeSingle();
    if(custErr){ console.error(custErr); showError('فشل التحميل · Load failed: ' + custErr.message); return; }
    if(!cust){ showError('العميل غير موجود · Customer not found'); return; }
    currentCustomer = cust;
    const {data: invs} = await sb.from('invoices')
      .select('id, invoice_number, issue_date, due_date, total, amount_paid, status, payment_status, invoice_type')
      .eq('customer_id', customerId).order('issue_date',{ascending:false});
    allInvoices = invs || [];

    /* Round 4l.7: load credit notes for this customer (silent fail if table missing) */
    try {
      const {data: cns} = await sb.from('credit_notes')
        .select('id, credit_note_number, issue_date, original_invoice_id, original_invoice_number, total, reason')
        .eq('customer_id', customerId)
        .order('issue_date', {ascending: false});
      allCreditNotes = cns || [];
    } catch(e){ allCreditNotes = []; }

    /* Round 4l.8: load debit notes for this customer (silent fail if table missing) */
    try {
      const {data: dns} = await sb.from('debit_notes')
        .select('id, debit_note_number, issue_date, original_invoice_id, original_invoice_number, total, reason')
        .eq('customer_id', customerId)
        .order('issue_date', {ascending: false});
      allDebitNotes = dns || [];
    } catch(e){ allDebitNotes = []; }

    renderAll();
    document.getElementById('loading-state').style.display='none';
    document.getElementById('page').style.display='';
  } catch(e){ console.error(e); showError('فشل التحميل · ' + (e.message||'')); }
}
function showError(msg){
  document.getElementById('loading-state').style.display='none';
  const err = document.getElementById('error-state');
  err.textContent = msg; err.style.display='';
}
function renderAll(){
  const c = currentCustomer;
  const nameAr = c.name_ar || c.name || '';
  const nameEn = c.name_en || '';
  document.getElementById('cust-name-ar').textContent = nameAr || nameEn || '—';
  document.getElementById('cust-name-en').textContent = (nameEn && nameEn !== nameAr) ? nameEn : '';
  const typeBadge = document.getElementById('cust-type-badge');
  typeBadge.innerHTML = c.customer_type === 'b2b'
    ? '<span class="badge-b2b">B2B · شركة</span>'
    : '<span class="badge-b2c">B2C · فرد</span>';
  document.getElementById('new-invoice-btn').href = `invoices.html?action=new_invoice&customer=${c.id}`;
  document.getElementById('stat-count').textContent = allInvoices.filter(i=>i.status!=='voided').length;
  document.getElementById('stat-paid').textContent = 'SAR ' + fmt(c.total_paid||0);
  document.getElementById('stat-outstanding').textContent = 'SAR ' + fmt(c.total_outstanding||0);
  document.getElementById('stat-last-date').textContent = c.last_invoice_date || '—';
  const info = document.getElementById('info-grid');
  const items = [];
  if(c.cr_number) items.push(['CR · سجل تجاري', c.cr_number, true]);
  if(c.tax_number || c.trn) items.push(['VAT · الرقم الضريبي', c.tax_number||c.trn, true]);
  if(c.phone || c.mobile) items.push(['الهاتف · Phone', c.phone||c.mobile, true]);
  if(c.email) items.push(['البريد · Email', c.email, false]);
  if(c.customer_code) items.push(['الرمز · Code', c.customer_code, true]);
  const addr = [c.building_number, c.street_name, c.district, c.city, c.postal_code].filter(Boolean);
  if(addr.length) items.push(['العنوان · Address', addr.join('، '), false]);
  else if(c.address) items.push(['العنوان · Address', c.address, false]);
  if(c.notes) items.push(['ملاحظات · Notes', c.notes, false]);
  info.innerHTML = items.length === 0
    ? '<div style="color:var(--muted);font-size:13px;">لا توجد بيانات إضافية · No additional info</div>'
    : items.map(([l,v,m])=>`<div><div class="info-label">${escHTML(l)}</div><div class="info-value ${m?'mono':''}">${escHTML(v)}</div></div>`).join('');
  renderInvoicesList();
  renderPaymentsList();
  renderCreditNotesList();
  renderDebitNotesList();
}
function renderInvoicesList(){
  const wrap = document.getElementById('invoices-list');
  if(allInvoices.length === 0){ wrap.innerHTML = '<div class="empty">لا توجد فواتير · No invoices yet</div>'; return; }
  wrap.innerHTML = `<table class="tbl"><thead><tr>
    <th>الرقم · Number</th><th>التاريخ · Date</th><th>النوع · Type</th>
    <th class="num">الإجمالي · Total</th><th class="num">المدفوع · Paid</th><th>الحالة · Status</th>
  </tr></thead><tbody>${allInvoices.map(inv=>{
    const total = parseFloat(inv.total)||0, paid = parseFloat(inv.amount_paid)||0;
    let badge;
    if(inv.status==='voided') badge='<span class="status-voided">ملغية · Voided</span>';
    else if(inv.payment_status==='paid') badge='<span class="status-paid">مدفوعة · Paid</span>';
    else if(inv.payment_status==='partial') badge='<span class="status-partial">جزئية · Partial</span>';
    else badge='<span class="status-unpaid">غير مدفوعة · Unpaid</span>';
    return `<tr onclick="window.location.href='invoice-view.html?id=${inv.id}'">
      <td class="mono" style="font-weight:700;">${escHTML(inv.invoice_number||'—')}</td>
      <td class="mono">${escHTML(inv.issue_date||'—')}</td>
      <td>${inv.invoice_type==='b2b'?'B2B':'B2C'}</td>
      <td class="num">SAR ${fmt(total)}</td>
      <td class="num">SAR ${fmt(paid)}</td>
      <td>${badge}</td></tr>`;
  }).join('')}</tbody></table>`;
}
function renderPaymentsList(){
  const wrap = document.getElementById('payments-list');
  const paid = allInvoices.filter(i=>i.status!=='voided' && (parseFloat(i.amount_paid)||0)>0);
  if(paid.length === 0){ wrap.innerHTML = '<div class="empty">لا توجد مدفوعات · No payments yet</div>'; return; }
  wrap.innerHTML = `<table class="tbl"><thead><tr>
    <th>الفاتورة · Invoice</th><th>تاريخ الفاتورة · Date</th>
    <th class="num">الإجمالي · Total</th><th class="num">المدفوع · Paid</th><th>الحالة · Status</th>
  </tr></thead><tbody>${paid.map(inv=>{
    const total=parseFloat(inv.total)||0, p=parseFloat(inv.amount_paid)||0;
    const fully = p >= total - 0.01;
    return `<tr onclick="window.location.href='invoice-view.html?id=${inv.id}'">
      <td class="mono" style="font-weight:700;">${escHTML(inv.invoice_number||'—')}</td>
      <td class="mono">${escHTML(inv.issue_date||'—')}</td>
      <td class="num">SAR ${fmt(total)}</td>
      <td class="num" style="color:var(--green);font-weight:700;">SAR ${fmt(p)}</td>
      <td>${fully?'<span class="status-paid">كاملة · Full</span>':'<span class="status-partial">جزئية · Partial</span>'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}
function switchTab(name){
  ['invoices','payments','credit-notes','debit-notes'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('pane-'+t).style.display = t===name?'':'none';
  });
}

function renderCreditNotesList(){
  const wrap = document.getElementById('credit-notes-list');
  if(allCreditNotes.length === 0){
    wrap.innerHTML = '<div class="empty">لا توجد إشعارات دائنة · No credit notes</div>';
    return;
  }
  wrap.innerHTML = `<table class="tbl"><thead><tr>
    <th>رقم الإشعار · CN Number</th>
    <th>التاريخ · Date</th>
    <th>الفاتورة الأصلية · Original</th>
    <th>السبب · Reason</th>
    <th class="num">المبلغ · Amount</th>
  </tr></thead><tbody>${allCreditNotes.map(cn => `
    <tr onclick="window.location.href='credit-note-view.html?id=${cn.id}'">
      <td><strong style="color:#7f1d1d;">${escHTML(cn.credit_note_number||'—')}</strong></td>
      <td class="mono">${escHTML(cn.issue_date||'—')}</td>
      <td class="mono"><a href="invoice-view.html?id=${cn.original_invoice_id}" onclick="event.stopPropagation()">${escHTML(cn.original_invoice_number||'—')}</a></td>
      <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escHTML(cn.reason||'')}">${escHTML(cn.reason||'—')}</td>
      <td class="num" style="color:#7f1d1d;font-weight:700;">−SAR ${fmt(cn.total)}</td>
    </tr>
  `).join('')}</tbody></table>`;
}

function renderDebitNotesList(){
  const wrap = document.getElementById('debit-notes-list');
  if(allDebitNotes.length === 0){
    wrap.innerHTML = '<div class="empty">لا توجد إشعارات مدينة · No debit notes</div>';
    return;
  }
